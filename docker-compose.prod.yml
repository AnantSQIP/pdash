# Production stack: Postgres + API + Web. Run from the repo root:
#   cp .env.production.example .env.production   # then edit the secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# The web container proxies /api/* to the api container over the compose network, so only
# the web port is published. Postgres and the API are not exposed to the host.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_DEV_TRUST_HEADER: "false"
      # Uploaded documents (patent PDFs, attachments) live on this mounted volume, NOT in the DB.
      DOCUMENT_STORAGE_DIR: /app/.data/documents
    volumes:
      - docdata:/app/.data
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the Next standalone build so /api/* proxies to the api service (not localhost).
        API_ORIGIN: http://api:4000
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Server-side proxy target — the api service on the compose network.
      API_ORIGIN: http://api:4000
    ports:
      # Bind to localhost by default so Docker's iptables rules don't bypass the host
      # firewall and expose :3000 to the internet. A TLS reverse proxy (Caddy) fronts it.
      # Set WEB_BIND=0.0.0.0 only if you intentionally want the raw port public.
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
  docdata:
